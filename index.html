<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pool Forecast">
<title>Pool Forecast</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1220;--card:#111827;--border:#1f2d42;
  --blue:#38bdf8;--green:#22d3a0;--yellow:#fbbf24;
  --red:#f87171;--text:#e2eaf4;--muted:#4a6080;--salt:#a78bfa;
  --orange:#fb923c;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;height:-webkit-fill-available;}
body{min-height:100vh;min-height:-webkit-fill-available;background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;padding-bottom:48px;}

.hdr{padding:14px 15px 10px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.app-title{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:var(--blue);line-height:1;}
.app-sub{font-size:.52rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:3px;}
.uv-box{text-align:right;}
.uv-val{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;line-height:1;}
.uv-lbl{font-size:.46rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

.rain-row{display:flex;gap:0;}
.rcol{flex:1;text-align:center;padding:0 4px;border-right:1px solid var(--border);}
.rcol:last-child{border-right:none;}
.rcol-lbl{font-size:.42rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.rcol-val{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;}
.data-src{font-size:.44rem;color:var(--muted);margin-top:6px;letter-spacing:.04em;}

.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);}
.tab{flex:1;padding:9px 2px 7px;background:none;border:none;border-bottom:2px solid transparent;
  color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.58rem;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:center;}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab-dot{width:5px;height:5px;border-radius:50%;margin:0 auto 3px;background:var(--border);}
.tab.active .tab-dot{background:var(--blue);}
.td-g{background:var(--green);}.td-y{background:var(--yellow);}.td-r{background:var(--red);}

.content{padding:13px;display:flex;flex-direction:column;gap:11px;}

/* FC INPUT */
.fc-input-card{background:var(--card);border:1px solid var(--border);padding:13px;}
.fc-lbl{font-size:.5rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:9px;}
.fc-row{display:flex;align-items:center;gap:12px;}
.fc-input{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;
  background:var(--bg);border:2px solid var(--border);color:var(--text);
  width:110px;padding:7px 10px;text-align:center;
  -webkit-appearance:none;appearance:none;border-radius:0;outline:none;transition:border-color .15s;}
.fc-input:focus{border-color:var(--blue);}
.fc-hints{display:flex;flex-direction:column;gap:3px;}
.fc-hint{font-size:.5rem;letter-spacing:.04em;line-height:1.4;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);}
.card-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:8px 13px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.015);}
.card-title{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.cbadge{font-size:.48rem;letter-spacing:.09em;text-transform:uppercase;padding:2px 6px;}
.bg{background:rgba(34,211,160,.1);color:var(--green);border:1px solid rgba(34,211,160,.2);}
.by{background:rgba(251,191,36,.1);color:var(--yellow);border:1px solid rgba(251,191,36,.2);}
.br{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.bs{background:rgba(167,139,250,.1);color:var(--salt);border:1px solid rgba(167,139,250,.2);}
.bo{background:rgba(251,146,60,.1);color:var(--orange);border:1px solid rgba(251,146,60,.2);}

/* DOSE TARGET */
.target-block{padding:13px;}
.target-hero{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;}
.target-num{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;color:var(--blue);line-height:1;}
.target-unit{font-size:.6rem;color:var(--muted);letter-spacing:.08em;margin-left:3px;}
.target-sub{font-size:.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
.target-math{text-align:right;font-size:.54rem;color:var(--muted);line-height:1.9;}
.target-math span{color:var(--text);}
.target-math .floor{color:var(--green);font-weight:500;}

/* Now → Target row */
.arrow-row{display:flex;align-items:center;gap:7px;margin-bottom:10px;
  padding:8px 10px;background:var(--bg);border:1px solid var(--border);}
.arrow-label{font-size:.48rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.arrow-fc{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;}
.arrow-sep{color:var(--muted);font-size:.9rem;}
.arrow-target{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--blue);}
.arrow-add{font-size:.54rem;color:var(--muted);margin-left:auto;}
.arrow-add span{color:var(--text);}

.bar{height:7px;background:var(--border);overflow:hidden;margin-bottom:4px;}
.bar-fill{height:100%;transition:width .4s;}
.bar-lbls{display:flex;justify-content:space-between;font-size:.44rem;color:var(--muted);}

.dose-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);}
.dose-cell{background:var(--card);padding:11px 12px;}
.dose-num{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;line-height:1;}
.dose-unit{font-size:.52rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:3px;}
.dose-note{font-size:.5rem;color:var(--muted);margin-top:3px;line-height:1.4;}
.dose-meta{padding:8px 12px;border-top:1px solid var(--border);font-size:.52rem;color:var(--muted);line-height:1.7;}
.dose-meta span{color:var(--text);}

/* WEEK OUTLOOK */
.week-row{display:flex;gap:0;border-top:1px solid var(--border);}
.wd{flex:1;text-align:center;padding:7px 3px;border-right:1px solid var(--border);}
.wd:last-child{border-right:none;}
.wd-n{font-size:.44rem;color:var(--muted);letter-spacing:.08em;margin-bottom:3px;}
.wd-fc{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;}
.wd-uv{font-size:.42rem;margin-top:1px;}
.wd-uv.low{color:var(--green);}.wd-uv.mod{color:var(--yellow);}.wd-uv.high{color:var(--red);}
/* floor line indicator */
.wd.is-floor .wd-fc::after{content:'←';font-size:.4rem;color:var(--green);margin-left:2px;}

/* LOW FC */
.low-card{background:var(--card);border:1px solid rgba(251,146,60,.3);}
.low-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:8px 13px;border-bottom:1px solid rgba(251,146,60,.2);background:rgba(251,146,60,.04);}
.low-inner{padding:11px 13px;}
.low-desc{font-size:.54rem;color:var(--muted);line-height:1.6;margin-bottom:9px;}
.ldrow{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid var(--border);}
.ldrow:last-child{border-bottom:none;}
.ldkey{font-size:.56rem;color:var(--muted);}
.ldval{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--orange);}
.bromide-block{margin-top:9px;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);padding:9px 11px;}
.bromide-title{font-size:.5rem;color:var(--red);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.bromide-txt{font-size:.54rem;color:var(--red);line-height:1.6;}

/* SALT */
.srow{display:flex;justify-content:space-between;align-items:center;
  padding:9px 12px;border-bottom:1px solid var(--border);}
.srow:last-child{border-bottom:none;}
.skey{font-size:.56rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.sval{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700;}
.sval.ok{color:var(--green);}.sval.low{color:var(--yellow);}.sval.add{color:var(--salt);}

.day-label{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}

.spin{display:inline-block;width:9px;height:9px;border:1.5px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="app-title">POOL FORECAST</div>
      <div class="app-sub" id="app-sub">Hunters Green · CYA 50ppm · 10k gal</div>
    </div>
    <div style="display:flex;gap:14px;align-items:flex-start;">
      <div class="uv-box">
        <div class="uv-val" id="hdr-uv">—</div>
        <div class="uv-lbl">Today's UV Peak</div>
        <div style="font-size:.44rem;color:var(--muted);margin-top:1px;">7D Peak: <span id="hdr-uv-peak" style="color:var(--yellow);">—</span></div>
      </div>
      <div class="uv-box">
        <div class="uv-val" id="hdr-wtemp" style="color:var(--green);">—</div>
        <div class="uv-lbl">Pool Temp</div>
        <div style="font-size:.44rem;color:var(--muted);margin-top:1px;">Floor: <span id="hdr-floor" style="color:var(--green);">—</span></div>
      </div>
    </div>
  </div>
  <div class="rain-row">
    <div class="rcol"><div class="rcol-lbl">1hr obs</div><div class="rcol-val" id="r1h" style="color:var(--blue)"><span class="spin"></span></div></div>
    <div class="rcol"><div class="rcol-lbl">24hr obs</div><div class="rcol-val" id="r24h" style="color:var(--blue)"><span class="spin"></span></div></div>
    <div class="rcol"><div class="rcol-lbl">48hr obs</div><div class="rcol-val" id="r48h" style="color:var(--blue)"><span class="spin"></span></div></div>
    <div class="rcol"><div class="rcol-lbl">72hr obs</div><div class="rcol-val" id="r72h" style="color:var(--blue)"><span class="spin"></span></div></div>
    <div class="rcol"><div class="rcol-lbl">7d fcst</div><div class="rcol-val" id="r7d" style="color:var(--green)"><span class="spin"></span></div></div>
  </div>
  <div class="data-src" id="data-src">MRMS/IEM · WPC QPF D1–7 · loading...</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="selDay(0,this)"><div class="tab-dot td-g" id="td0"></div>MON</button>
  <button class="tab" onclick="selDay(1,this)"><div class="tab-dot td-g" id="td1"></div>TUE</button>
  <button class="tab" onclick="selDay(2,this)"><div class="tab-dot td-g" id="td2"></div>WED</button>
  <button class="tab" onclick="selDay(3,this)"><div class="tab-dot td-g" id="td3"></div>THU</button>
  <button class="tab" onclick="selDay(4,this)"><div class="tab-dot td-g" id="td4"></div>FRI</button>
</div>

<div class="content" id="content"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const POOL_GAL=10000, POOL_SQFT=450;
const SALT_IDEAL=3200, SALT_MIN=2800, SALT_MAX=3400, SALT_BAG_PPM=200, SALT_POOLS=4;
const UV_DECAY=0.01;         // ppm/UV-index-hour, CYA 50 stabilized
const HYPO_OZ_PER_PPM=1.84; // 73% cal hypo oz per ppm per 10k gal (verified against pool math app)
const TAB_PPM_WEEK=2.5;      // 3" tab contribution over 7 days in 10k gal (~2-3 ppm)
const RAIN_GAL_IN=POOL_SQFT*0.623;
const FC_DEFAULT=7;
const FC_SHOCK=20;

// Water temp from Open-Meteo soil temp (good pool water proxy), in °F
// Falls back to seasonal estimate if not loaded yet
function waterTempF(daysAhead){
  if(uvData?.daily?.soil_temperature_0_to_7cm_mean){
    const idx=Math.min(daysAhead, uvData.daily.soil_temperature_0_to_7cm_mean.length-1);
    const t=uvData.daily.soil_temperature_0_to_7cm_mean[idx];
    if(t!=null) return Math.round(t*10)/10;
  }
  // Fallback: rough Florida seasonal estimate
  const m=new Date().getMonth()+1;
  return m>=5&&m<=9?85:m>=3&&m<=4||m>=10&&m<=11?74:64;
}

// FC floor based on water temp:
// Linear scale anchored at 54°F→5ppm, 70°F→7ppm, 80°F→8ppm
// Slope: (8-5)/(80-54) = 3/26 ≈ 0.115 ppm per °F
function fcFloorFromTemp(tempF){
  const floor=5+(tempF-54)*(3/26);
  return Math.round(Math.max(4,Math.min(10,floor))*2)/2; // round to nearest 0.5, cap 4-10
}

const LAT=28.131, LON=-82.352;
const WMS_MRMS='https://mesonet.agron.iastate.edu/cgi-bin/wms/us/mrms_nn.cgi';
const WMS_WPC='https://mapservices.weather.noaa.gov/vector/services/precip/wpc_qpf/MapServer/WMSServer';

// ── STATE ──────────────────────────────────────────────────
function loadDS(d){try{return JSON.parse(sessionStorage.getItem('pd_'+d))||{};}catch{return{};}}
function saveDS(d,s){try{sessionStorage.setItem('pd_'+d,JSON.stringify(s));}catch{}}

const rain={obs1h:0,obs24h:0,obs48h:0,obs72h:0,fcast7d:0};
let uvData=null;
let activeDay=(()=>{const d=new Date().getDay();return d>=1&&d<=5?d-1:0;})();

// ── MRMS PIXEL DECODE ──────────────────────────────────────
const CM=[[0,0,255,0],[0,255,255,12.7],[0,255,0,25.4],[255,255,0,50.8],
  [255,128,0,76.2],[255,0,0,101.6],[180,0,180,152.4],[128,0,128,203.2],[255,255,255,254]];
function px2mm(r,g,b){
  if(r<=3&&g<=3&&b<=3)return null;
  if(r>200&&g>200&&b>200)return null;
  if(Math.abs(r-g)<15&&Math.abs(g-b)<15&&Math.abs(r-b)<15)return null;
  let best=Infinity,mm=null;
  for(let i=0;i<CM.length-1;i++){
    const[r1,g1,b1,m1]=CM[i],[r2,g2,b2,m2]=CM[i+1];
    const dx=r2-r1,dy=g2-g1,dz=b2-b1,l=dx*dx+dy*dy+dz*dz;
    if(!l)continue;
    const t=Math.max(0,Math.min(1,((r-r1)*dx+(g-g1)*dy+(b-b1)*dz)/l));
    const d=(r-r1-t*dx)**2+(g-g1-t*dy)**2+(b-b1-t*dz)**2;
    if(d<best){best=d;mm=m1+t*(m2-m1);}
  }
  return best>4000?null:mm;
}
async function fetchMRMS(layer){
  const S=11,delta=0.04,bbox=`${LON-delta},${LAT-delta},${LON+delta},${LAT+delta}`;
  const p=new URLSearchParams({SERVICE:'WMS',VERSION:'1.1.1',REQUEST:'GetMap',
    LAYERS:layer,STYLES:'',BBOX:bbox,WIDTH:S,HEIGHT:S,FORMAT:'image/png',TRANSPARENT:'TRUE',SRS:'EPSG:4326'});
  return new Promise(res=>{
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{
      try{
        const c=document.createElement('canvas');c.width=S;c.height=S;
        const ctx=c.getContext('2d');
        ctx.fillStyle='#010101';ctx.fillRect(0,0,S,S);ctx.drawImage(img,0,0);
        const m=Math.floor(S/2);
        const[r,g,b]=ctx.getImageData(m,m,1,1).data;
        if(r<=3&&g<=3&&b<=3){res(0);return;}
        const mm=px2mm(r,g,b);
        res(mm===null?0:mm/25.4);
      }catch{res(0);}
    };
    img.onerror=()=>res(0);
    img.src=`${WMS_MRMS}?${p}`;
  });
}
async function fetchWPC(layerNum){
  const delta=0.1;
  const p=new URLSearchParams({SERVICE:'WMS',VERSION:'1.3.0',REQUEST:'GetFeatureInfo',
    LAYERS:String(layerNum),QUERY_LAYERS:String(layerNum),
    INFO_FORMAT:'application/geo+json',FEATURE_COUNT:'1',CRS:'CRS:84',
    BBOX:`${LON-delta},${LAT-delta},${LON+delta},${LAT+delta}`,
    WIDTH:101,HEIGHT:101,I:51,J:51,FORMAT:'image/png'});
  try{
    const r=await fetch(`${WMS_WPC}?${p}`);
    if(!r.ok)return 0;
    const j=await r.json();
    if(!j.features?.length)return 0;
    const v=j.features[0].properties;
    return parseFloat(v.qpf??v.QPF??v.Qpf??0)||0;
  }catch{return 0;}
}
async function fetchUV(){
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
    +`&daily=uv_index_max,soil_temperature_0_to_7cm_mean&timezone=America%2FNew_York&forecast_days=10&temperature_unit=fahrenheit`;
  return(await fetch(u)).json();
}

// ── CHEMISTRY ─────────────────────────────────────────────
// Total UV index-hours over 7 days starting daysAhead from today
function uvSum7(daysAhead){
  if(!uvData)return 560;
  let s=0;
  for(let i=daysAhead;i<daysAhead+7;i++){
    const idx=Math.min(i,uvData.daily.uv_index_max.length-1);
    s+=(uvData.daily.uv_index_max[idx]??8)*10;
  }
  return s;
}

// THE CORE QUESTION:
// "What FC do I dose to today so the pool is still at FLOOR next visit?"
//
// Simple: doseTarget = floor + net degradation over 7 days
//   netDeg = uvLoss + rainLoss - tabGain
//   doseTarget = floor + netDeg
//
function calcDoseTarget(uvSum, fcastRainIn, tabOn, tempF){
  const floor=fcFloorFromTemp(tempF??75);
  const uvLoss=Math.round((uvSum*UV_DECAY+0.05)*10)/10; // round up at .5
  const rainLoss=fcastRainIn>0
    ?floor*(1-(POOL_GAL/(POOL_GAL+fcastRainIn*RAIN_GAL_IN)))
    :0;
  const tabGain=tabOn?TAB_PPM_WEEK:0;
  const netDeg=Math.max(0,uvLoss+rainLoss-tabGain);
  const target=floor+netDeg;
  return{
    target:Math.round(Math.min(FC_SHOCK-1,target)*10)/10,
    uvLoss:Math.round(uvLoss*10)/10,
    rainLoss:Math.round(rainLoss*10)/10,
    netDeg:Math.round(netDeg*10)/10,
    floor,
    tabGain,
    tempF:tempF??75
  };
}

// Project FC day-by-day from a starting point
function projectFC(startFC, daysAhead, tabOn){
  const days=[];
  let fc=startFC;
  const todayDOW=new Date().getDay();
  const startDOW=(todayDOW+daysAhead)%7;
  const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dailyTabGain=tabOn?(TAB_PPM_WEEK/7):0;
  const dailyRain=(rain.fcast7d??0)/7;
  for(let i=0;i<7;i++){
    if(i>0){
      const idx=Math.min(daysAhead+i,(uvData?.daily.uv_index_max.length??0)-1);
      const uvi=(uvData?.daily.uv_index_max[idx]??8)*10;
      fc-=uvi*UV_DECAY;
      fc+=dailyTabGain;
      if(dailyRain>0) fc=fc*(POOL_GAL/(POOL_GAL+dailyRain*RAIN_GAL_IN));
      fc=Math.max(0,fc);
    }
    const uvI=uvData?.daily.uv_index_max[Math.min(daysAhead+i,(uvData?.daily.uv_index_max.length??0)-1)]??8;
    const dow=(startDOW+i)%7;
    days.push({n:dn[dow].slice(0,3),fc:Math.round(fc*10)/10,uv:uvI,isLast:i===6});
  }
  return days;
}

function calcHypo(fcNow,target){
  return Math.round(Math.max(0,target-fcNow)*HYPO_OZ_PER_PPM*10)/10;
}
function calcTabs(deficit){
  if(deficit<=0)return'0';
  if(deficit<3)return'½';
  return'1';
}
function saltDrop(totalRainIn){return Math.round((totalRainIn*RAIN_GAL_IN/POOL_GAL)*SALT_IDEAL);}
function uvClass(uv){return uv>=8?'high':uv>=5?'mod':'low';}
function fcCol(fc,floor){return fc<floor*0.7?'var(--red)':fc<floor?'var(--yellow)':'var(--green)';}
function barColor(target){
  // gradient reflects where in the 0-20 range the target sits
  const pct=Math.min(100,(target/FC_SHOCK)*100);
  if(pct<35)return'var(--red)';
  if(pct<55)return'var(--yellow)';
  if(pct<75)return'var(--green)';
  return'var(--blue)';
}

// ── RENDER ─────────────────────────────────────────────────
function renderDay(dayIdx){
  const ds=loadDS(dayIdx);
  const fcReading=ds.fc!==undefined?ds.fc:FC_DEFAULT;

  const todayDOW=new Date().getDay();
  const targetDOW=dayIdx+1;
  const daysAhead=(targetDOW-todayDOW+7)%7;
  const name=['Monday','Tuesday','Wednesday','Thursday','Friday'][dayIdx];
  const lbl=daysAhead===0?name+' — Today':name;

  const uv7=uvSum7(daysAhead);
  const fcastIn=rain.fcast7d??0;
  const obsIn=rain.obs72h??0;

  const tabOn=ds.tabOn!==false;
  const wTemp=waterTempF(daysAhead);
  const recTab=(uv7*UV_DECAY)>=3?1:0;
  const tabAmt=ds.tabAmt??recTab;
  const effectiveTabOn=tabOn&&tabAmt>0;
  const{target,uvLoss,rainLoss,netDeg,floor,tabGain,tempF}=calcDoseTarget(uv7,fcastIn,effectiveTabOn,wTemp);
  const tabPpm=tabAmt>0?Math.round(tabAmt*2.5*10)/10:0;
  const fullDeficit=Math.max(0,target-fcReading);
  // Only reduce hypo by tab contribution if offset is on — otherwise hypo covers full deficit
  const remainingDeficit=effectiveTabOn?Math.max(0,fullDeficit-tabPpm):fullDeficit;
  const hypoOz=Math.round(remainingDeficit*HYPO_OZ_PER_PPM*10)/10;

  // Projected end-of-week FC if dosed to target
  const outlook=projectFC(target,daysAhead,effectiveTabOn);
  const endFC=outlook[6].fc;

  // Salt — drop based on 72h observed + 7d forecast rain combined
  const totalRainForSalt=obsIn+fcastIn;
  const drop=saltDrop(totalRainForSalt);
  const bagsPerPool=drop>=SALT_BAG_PPM?Math.floor(drop/SALT_BAG_PPM):0;
  const bagsTotal=bagsPerPool>0?bagsPerPool*SALT_POOLS:0;

  // Outlook HTML
  let outH='';
  outlook.forEach((o,i)=>{
    const isLast=i===6;
    outH+=`<div class="wd${isLast?' is-floor':''}">
      <div class="wd-n">${o.n}</div>
      <div class="wd-fc" style="color:${fcCol(o.fc,floor)}">${o.fc}</div>
      <div class="wd-uv ${uvClass(o.uv)}">${o.uv}</div>
    </div>`;
  });

  // FC input color
  const inputCol=fcReading<floor*0.7?'var(--red)':fcReading<floor?'var(--yellow)':'var(--green)';

  // Season label
  const seasonFloor=`${floor} ppm floor · water ~${wTemp}°F`;

  // Bar: show current FC position and target
  const targetPct=Math.min(100,(target/FC_SHOCK)*100);
  const nowPct=Math.min(100,(fcReading/FC_SHOCK)*100);

  document.getElementById('content').innerHTML=`
    <div class="day-label">${lbl}</div>

    <!-- FC READING -->
    <div class="fc-input-card">
      <div class="fc-lbl">Today's FC reading — route spot-check (ppm)</div>
      <div class="fc-row">
        <input class="fc-input" type="number" min="0" max="20" step="0.5"
          value="${fcReading}"
          style="color:${inputCol};border-color:${inputCol};"
          oninput="onFC(${dayIdx},this.value)"/>
        <div class="fc-hints">
          <div class="fc-hint" style="color:var(--red);">Below 4 = too low</div>
          <div class="fc-hint" style="color:var(--yellow);">4–6 = low</div>
          <div class="fc-hint" style="color:var(--green);">7–8 = ideal</div>
          <div class="fc-hint" style="color:var(--muted);margin-top:3px;">${seasonFloor}</div>
        </div>
      </div>
    </div>

    <!-- DOSE TARGET -->
    <div class="card">
      <div class="card-hdr">
        <div class="card-title">Dose All Pools To</div>
        <span class="cbadge bg">≥${floor} PPM NEXT VISIT</span>
      </div>
      <div class="target-block">

        <!-- Hero number -->
        <div class="target-hero">
          <div>
            <div class="target-num">${target}<span class="target-unit">PPM</span></div>
            <div class="target-sub">Start today → arrives at ${floor}+ ppm next week</div>
          </div>
          <div class="target-math">
            Water temp: <span>${wTemp}°F</span><br>
            Floor next visit: <span class="floor">${floor} ppm</span><br>
            + UV decay: <span>+${uvLoss} ppm</span><br>
            + Rain loss: <span>+${rainLoss} ppm</span><br>
            − Tab gain: <span>−${tabGain} ppm</span><br>
            = Dose to: <span class="floor">${target} ppm</span>
          </div>
        </div>

        <!-- Now → Target -->
        <div class="arrow-row">
          <div class="arrow-label">Now</div>
          <div class="arrow-fc" style="color:${inputCol}">${fcReading}</div>
          <div class="arrow-sep">→</div>
          <div class="arrow-target">${target}</div>
          <div class="arrow-label" style="margin-left:2px;">target</div>
          <div class="arrow-add" style="margin-left:auto;">
            +<span>${Math.round(Math.max(0,target-fcReading)*10)/10} ppm needed</span>
          </div>
        </div>

        <!-- Bar: shows target position on 0-20 scale -->
        <div class="bar" style="position:relative;">
          <div class="bar-fill" style="width:${targetPct}%;background:linear-gradient(90deg,var(--red),var(--yellow) 35%,var(--green) 55%,var(--blue));"></div>
        </div>
        <div class="bar-lbls" style="margin-bottom:10px;">
          <span>0</span><span>Floor ${floor}</span><span>10</span><span>Shock ${FC_SHOCK}</span>
        </div>

        <!-- Dose section -->
        <div style="border-top:1px solid var(--border);margin:0 -13px -13px;">
          <div class="dose-grid">
            <!-- CAL HYPO CELL -->
            <div class="dose-cell">
              <div class="dose-num" style="color:${remainingDeficit>0?'var(--text)':'var(--muted)'}">
                ${remainingDeficit<=0?'None needed':`${hypoOz} oz`}
              </div>
              <div class="dose-unit">73% Cal Hypo</div>
              <div class="dose-note">
                ${remainingDeficit>0
                  ?`${fcReading} + ${tabPpm} tab = ${Math.round((fcReading+tabPpm)*10)/10} → ${target} ppm`
                  :`Tabs cover full deficit`}
              </div>
            </div>

            <!-- TAB CELL -->
            <div class="dose-cell">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:9px;">
                <button onclick="toggleTab(${dayIdx})"
                  style="font-family:'IBM Plex Mono',monospace;font-size:.48rem;letter-spacing:.06em;
                  padding:3px 8px;cursor:pointer;border-radius:0;transition:all .15s;
                  background:${effectiveTabOn?'rgba(34,211,160,.12)':'rgba(255,255,255,.04)'};
                  border:1px solid ${effectiveTabOn?'var(--green)':'var(--border)'};
                  color:${effectiveTabOn?'var(--green)':'var(--muted)'};">
                  ${tabOn?'OFFSET ON':'OFFSET OFF'}
                </button>
                <span style="font-size:.46rem;color:var(--muted);">
                  ${effectiveTabOn?`−${tabGain} ppm from target`:'tabs not counted'}
                </span>
              </div>
              ${tabOn?`
              <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;">
                ${[0,0.5,1,1.5,2].map(n=>`
                  <button onclick="setTabAmt(${dayIdx},${n})"
                    style="font-family:'IBM Plex Mono',monospace;font-size:.6rem;padding:4px 8px;
                    cursor:pointer;border-radius:0;transition:all .15s;
                    background:${tabAmt===n?'rgba(34,211,160,.12)':'rgba(255,255,255,.03)'};
                    border:1px solid ${tabAmt===n?'var(--green)':n===recTab?'rgba(34,211,160,.3)':'var(--border)'};
                    color:${tabAmt===n?'var(--green)':n===recTab?'rgba(34,211,160,.6)':'var(--muted)'};">
                    ${n===0?'None':n}${n===recTab&&tabAmt!==n?' ·':''}
                  </button>`).join('')}
              </div>
              <div class="dose-unit">3" Tabs${tabAmt>0?` · +${tabPpm} ppm`:''}${tabAmt===recTab?' (rec)':''}</div>
              `:`
              <div style="font-size:.52rem;color:var(--muted);line-height:1.5;">Add tabs separately<br>as needed</div>
              `}
            </div>
          </div>
        </div>

      </div>
      <div class="dose-meta">
        72hr rain obs: <span style="color:var(--blue)">${fmtRain(obsIn)}</span> ·
        7d fcst rain: <span style="color:var(--green)">${fmtRain(fcastIn)}</span> ·
        Avg UV: <span>${Math.round(uv7/70)}</span>
      </div>

      <!-- 7-day FC survival -->
      <div class="week-row">${outH}</div>
    </div>

    <!-- LOW FC POOLS -->
    <div class="low-card">
      <div class="low-hdr">
        <div class="card-title" style="color:var(--orange);">If a Pool Has 0 Chlorine or Has Algae</div>
        <span class="cbadge bo">SHOCK PROTOCOL</span>
      </div>
      <div class="low-inner">
        <div class="low-desc">Any pool with 0–2 ppm or visible algae needs shock treatment in addition to the standard dose.</div>
        <div class="ldrow">
          <span class="ldkey">73% Cal Hypo (per pool)</span>
          <span class="ldval">${Math.round(FC_SHOCK*HYPO_OZ_PER_PPM*10)/10} oz</span>
        </div>
        <div class="ldrow">
          <span class="ldkey">Target FC</span>
          <span class="ldval">${FC_SHOCK} ppm</span>
        </div>
        <div class="ldrow">
          <span class="ldkey">Tab</span>
          <span class="ldval">1 tab</span>
        </div>
        <div class="bromide-block">
          <div class="bromide-title">🧪 Green or cloudy water</div>
          <div class="bromide-txt">Add sodium bromide before shocking. Brush walls and floor. Re-test in 24 hrs. Flag for follow-up if still green.</div>
        </div>
      </div>
    </div>

    <!-- SALT POOLS -->
    <div class="card">
      <div class="card-hdr">
        <div class="card-title">Salt Pools</div>
        <span class="cbadge bs">${SALT_POOLS} POOLS/DAY</span>
      </div>
      <div class="srow"><div class="skey">Ideal salinity</div>
        <div class="sval ok">3,000 – 3,400 ppm</div></div>
      <div class="srow"><div class="skey">Est. salinity drop after rain</div>
        <div class="sval ${drop>=400?'low':'ok'}">−${drop} ppm</div></div>
      <div class="srow"><div class="skey">72hr observed rain</div>
        <div class="sval" style="color:var(--blue)">${fmtRain(obsIn)}</div></div>
      <div class="srow"><div class="skey">7d forecast rain</div>
        <div class="sval" style="color:var(--green)">${fmtRain(fcastIn)}</div></div>
      ${bagsTotal>0
        ?`<div class="srow"><div class="skey">Per salt pool</div><div class="sval add">${bagsPerPool} bag${bagsPerPool!==1?'s':''}</div></div>
           <div class="srow"><div class="skey">Total (${SALT_POOLS} pools)</div><div class="sval add">${bagsTotal} bags</div></div>`
        :`<div class="srow"><div class="skey">Salt addition</div><div class="sval ok">None needed</div></div>`}
    </div>
  `;
}

// ── CONTROLS ───────────────────────────────────────────────
function setTabAmt(dayIdx,amt){
  const ds=loadDS(dayIdx);
  ds.tabAmt=amt;
  saveDS(dayIdx,ds);
  renderDay(dayIdx);
}
function toggleTab(dayIdx){
  const ds=loadDS(dayIdx);
  ds.tabOn=ds.tabOn===false?true:false; // flip
  saveDS(dayIdx,ds);
  renderDay(dayIdx);
  updateDots();
}
function onFC(dayIdx,val){
  const v=parseFloat(val);
  const ds=loadDS(dayIdx);
  ds.fc=isNaN(v)?FC_DEFAULT:Math.max(0,Math.min(30,v));
  saveDS(dayIdx,ds);
  renderDay(dayIdx);
  updateDots();
}
function selDay(idx,btn){
  activeDay=idx;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDay(idx);
}
function updateDots(){
  const floor=fcFloorFromTemp(waterTempF(0));
  for(let i=0;i<5;i++){
    const fc=loadDS(i).fc??FC_DEFAULT;
    const el=document.getElementById('td'+i);
    if(!el)continue;
    el.className=fc<4?'tab-dot td-r':fc<floor?'tab-dot td-y':'tab-dot td-g';
  }
}

// ── INIT ───────────────────────────────────────────────────
// Show enough decimals to always display at least 1 significant digit
function fmtRain(inches){
  if(inches===0) return '0.00"';
  if(inches>=0.1) return inches.toFixed(2)+'"';
  if(inches>=0.01) return inches.toFixed(2)+'"';
  return inches.toFixed(3)+'"';
}

async function init(){
  renderDay(activeDay);
  updateDots();

  const[r1h,r24h,r48h,r72h,uvRaw,r7d]=await Promise.all([
    fetchMRMS('mrms_p1h').catch(()=>0),
    fetchMRMS('mrms_p24h').catch(()=>0),
    fetchMRMS('mrms_p48h').catch(()=>0),
    fetchMRMS('mrms_p72h').catch(()=>0),
    fetchUV().catch(()=>null),
    fetchWPC(15).catch(()=>0),
  ]);

  rain.obs1h=r1h;rain.obs24h=r24h;rain.obs48h=r48h;rain.obs72h=r72h;rain.fcast7d=r7d;
  uvData=uvRaw;

  document.getElementById('r1h').textContent=fmtRain(r1h);
  document.getElementById('r24h').textContent=fmtRain(r24h);
  document.getElementById('r48h').textContent=fmtRain(r48h);
  document.getElementById('r72h').textContent=fmtRain(r72h);
  document.getElementById('r7d').textContent=fmtRain(r7d);
  if(uvData){
    const todayUV=uvData.daily.uv_index_max[0]??0;
    const weekUVs=uvData.daily.uv_index_max.slice(0,7).filter(v=>v!=null);
    const peakUV=Math.max(...weekUVs);
    document.getElementById('hdr-uv').textContent=todayUV.toFixed(1);
    document.getElementById('hdr-uv-peak').textContent=peakUV.toFixed(1);
    const wt=waterTempF(0);
    const fl=fcFloorFromTemp(wt);
    document.getElementById('hdr-wtemp').textContent=wt+'°F';
    document.getElementById('hdr-floor').textContent=fl+' ppm';
    document.getElementById('app-sub').textContent=
      `Hunters Green · CYA 50 · Water ~${wt}°F · ${fl} ppm floor`;
  }
  document.getElementById('data-src').textContent=
    `MRMS/IEM observed · WPC QPF D1–7 · ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;

  renderDay(activeDay);
  updateDots();
}

init();
</script>
</body>
</html>
